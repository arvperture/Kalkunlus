version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: kalkunlus_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: kalkunlus
      MYSQL_USER: kalkunlus
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - kalkunlus_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  # Laravel Backend
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kalkunlus_laravel
    environment:
      APP_NAME: Kalkunlus
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:key_will_be_generated
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: kalkunlus
      DB_USERNAME: kalkunlus
      DB_PASSWORD: secret
      SANCTUM_STATEFUL_DOMAINS: localhost:3000,localhost:3001
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      PYTHON_API_URL: http://fastapi:8001
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kalkunlus_network
    command: >
      sh -c "composer install &&
             php artisan key:generate &&
             php artisan migrate --force &&
             php artisan db:seed &&
             php artisan serve --host=0.0.0.0 --port=80"

  # FastAPI Backend (Python)
  fastapi:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: kalkunlus_fastapi
    environment:
      DEBUG: "false"
      API_PORT: 8001
      API_HOST: 0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      LARAVEL_API_URL: http://laravel
      SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "8001:8001"
    volumes:
      - ./backend-python:/app
    networks:
      - kalkunlus_network
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kalkunlus_frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_PYTHON_API_URL: http://localhost:8001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - kalkunlus_network
    command: npm run dev

volumes:
  mysql_data:
    driver: local

networks:
  kalkunlus_network:
    driver: bridge
